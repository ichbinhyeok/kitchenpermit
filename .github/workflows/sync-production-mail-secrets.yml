name: Sync production mail secrets

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  sync-mail-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy mail settings from production env into repo secrets
        env:
          GH_TOKEN: ${{ secrets.MAIL_SYNC_GH_TOKEN }}
          REPO: ${{ github.repository }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
        run: |
          set -euo pipefail

          echo "Remote production env files with mail-like key names:"
          ssh -i ~/.ssh/oci_key "$OCI_USERNAME@$OCI_HOST" 'cd ~/deploy/hood && python3 - <<'"'"'PY'"'"'
          from pathlib import Path
          import re

          pattern = re.compile(r"(MAIL|SMTP|ZOHO|EMAIL|RESET|SUPPORT)", re.IGNORECASE)
          candidates = sorted(Path.home().glob("**/.env"))
          found = False
          for env_path in candidates:
              try:
                  raw_lines = env_path.read_text(encoding="utf-8").splitlines()
              except (UnicodeDecodeError, OSError):
                  continue

              matches = []
              for raw_line in raw_lines:
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  if line.startswith("export "):
                      line = line[len("export "):].strip()
                  if "=" not in line:
                      continue
                  key = line.split("=", 1)[0].strip()
                  if pattern.search(key):
                      matches.append(key)

              if matches:
                  found = True
                  relative_path = env_path.relative_to(Path.home())
                  print("- ~/{}: {}".format(relative_path, ", ".join(sorted(set(matches)))))

          if not found:
              print("- none")
          PY'

          ssh -i ~/.ssh/oci_key "$OCI_USERNAME@$OCI_HOST" 'cd ~/deploy/hood && python3 - <<'"'"'PY'"'"'
          from pathlib import Path

          wanted = {
              "SPRING_MAIL_HOST",
              "SPRING_MAIL_PORT",
              "SPRING_MAIL_USERNAME",
              "SPRING_MAIL_PASSWORD",
              "SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH",
              "SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE",
              "HOOD_SITE_SUPPORT_EMAIL",
              "HOOD_AUTH_PASSWORD_RESET_MAIL_FROM",
              "HOOD_AUTH_EMAIL_VERIFICATION_MAIL_FROM",
              "HOOD_AUTH_EMAIL_VERIFICATION_REQUIRED",
          }

          candidates = [Path(".env")]
          candidates.extend(path for path in sorted(Path.home().glob("**/.env")) if path.resolve() != Path.cwd().joinpath(".env").resolve())

          for env_path in candidates:
              if not env_path.exists():
                  continue

              try:
                  raw_lines = env_path.read_text(encoding="utf-8").splitlines()
              except (UnicodeDecodeError, OSError):
                  continue

              emitted = False
              for raw_line in raw_lines:
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  if line.startswith("export "):
                      line = line[len("export "):].strip()
                  if "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  key = key.strip()
                  if key in wanted:
                      print("{}={}".format(key, value))
                      emitted = True

              if emitted:
                  break
          PY' > mail.env

          synced=0
          while IFS='=' read -r key value; do
            if [ -z "${key:-}" ]; then
              continue
            fi

            value="${value%$'\r'}"
            if [[ "$value" == \"*\" && "$value" == *\" ]]; then
              value="${value:1:${#value}-2}"
            elif [[ "$value" == \'*\' && "$value" == *\' ]]; then
              value="${value:1:${#value}-2}"
            fi

            if [ -z "$value" ]; then
              continue
            fi

            gh secret set "$key" --repo "$REPO" --body "$value" >/dev/null
            echo "synced $key"
            synced=$((synced + 1))
          done < mail.env

          if [ "$synced" -eq 0 ]; then
            echo "No mail-related keys were found in production .env" >&2
            exit 1
          fi

          echo "Synced $synced mail-related secrets."
