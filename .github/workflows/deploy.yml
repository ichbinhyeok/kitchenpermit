name: CD for OCI ARM64

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hood-production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install npm dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon test bootJar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kitchenpermit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          command_timeout: 30m
          script: |
            mkdir -p ~/deploy/hood
            mkdir -p ~/deploy/hood/storage
            cd ~/deploy/hood

            cat <<'EOF' > docker-compose.yml
            services:
              app:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/kitchenpermit:latest
                ports:
                  - "8810:8080"
                environment:
                  - APP_DATASOURCE_URL=${{ secrets.APP_DATASOURCE_URL }}
                  - APP_DATASOURCE_DRIVER=org.postgresql.Driver
                  - APP_DATASOURCE_USERNAME=${{ secrets.APP_DATASOURCE_USERNAME }}
                  - APP_DATASOURCE_PASSWORD=${{ secrets.APP_DATASOURCE_PASSWORD }}
                  - APP_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=2
                  - APP_DATASOURCE_HIKARI_MINIMUM_IDLE=0
                  - APP_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000
                  - APP_HIBERNATE_DDL_AUTO=validate
                  - HOOD_DATABASE_KEEPALIVE_ENABLED=true
                  - HOOD_DATABASE_KEEPALIVE_INITIAL_DELAY_MS=60000
                  - HOOD_DATABASE_KEEPALIVE_DELAY_MS=43200000
                  - HOOD_BILLING_PROVIDER=${{ secrets.HOOD_BILLING_PROVIDER || 'abstract' }}
                  - HOOD_BILLING_ENVIRONMENT=${{ secrets.HOOD_BILLING_ENVIRONMENT || 'sandbox' }}
                  - PADDLE_COMPANY_PRICE_ID=${{ secrets.PADDLE_COMPANY_PRICE_ID }}
                  - PADDLE_API_KEY=${{ secrets.PADDLE_API_KEY }}
                  - PADDLE_CLIENT_TOKEN=${{ secrets.PADDLE_CLIENT_TOKEN }}
                  - PADDLE_WEBHOOK_SECRET=${{ secrets.PADDLE_WEBHOOK_SECRET }}
                  - PADDLE_WEBHOOK_TOLERANCE_SECONDS=${{ secrets.PADDLE_WEBHOOK_TOLERANCE_SECONDS || '300' }}
                  - GG_JTE_DEVELOPMENT_MODE=false
                  - GG_JTE_USE_PRECOMPILED_TEMPLATES=true
                  - HOOD_SITE_BASE_URL=https://kitchenpermit.com
                  - HOOD_SITE_NAME=KitchenPermit
                  - HOOD_SITE_SUPPORT_EMAIL=support@kitchenpermit.com
                  - HOOD_STORAGE_ROOT=/app/storage
                  - HOOD_AXIS1_ASSET_STORAGE_DRIVER=${{ secrets.HOOD_AXIS1_ASSET_STORAGE_DRIVER || 'filesystem' }}
                  - HOOD_AXIS1_R2_BUCKET=${{ secrets.CLOUDFLARE_R2_BUCKET }}
                  - HOOD_AXIS1_R2_ENDPOINT=${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
                  - HOOD_AXIS1_R2_ACCESS_KEY_ID=${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
                  - HOOD_AXIS1_R2_SECRET_ACCESS_KEY=${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
                  - HOOD_AXIS1_R2_REGION=${{ secrets.CLOUDFLARE_R2_REGION || 'auto' }}
                  - HOOD_AXIS1_R2_KEY_PREFIX=${{ secrets.CLOUDFLARE_R2_KEY_PREFIX || 'axis1-reports' }}
                  - SPRING_H2_CONSOLE_ENABLED=false
                  - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID }}
                  - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET }}
                  - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE=openid,email,profile
                  - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0
                  - GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
                volumes:
                  - ./storage:/app/storage
                restart: always
                deploy:
                  resources:
                    limits:
                      memory: 1024M
            EOF

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            sleep 20
            docker compose ps
            if ! curl -fsS --max-time 10 http://127.0.0.1:8810/ >/tmp/hood-health.html; then
              docker compose logs --tail=160 app
              exit 1
            fi
