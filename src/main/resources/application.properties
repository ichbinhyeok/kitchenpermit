spring.application.name=hood
server.forward-headers-strategy=framework

gg.jte.developmentMode=${GG_JTE_DEVELOPMENT_MODE:true}
gg.jte.usePrecompiledTemplates=${GG_JTE_USE_PRECOMPILED_TEMPLATES:false}

spring.datasource.url=${APP_DATASOURCE_URL:jdbc:h2:file:./build/db/hood;MODE=PostgreSQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.driver-class-name=${APP_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${APP_DATASOURCE_USERNAME:sa}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${APP_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${APP_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=${APP_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.jpa.hibernate.ddl-auto=${APP_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.h2.console.enabled=true

hood.site.base-url=${HOOD_SITE_BASE_URL:https://kitchenpermit.com}
hood.site.name=${HOOD_SITE_NAME:hood}
hood.site.support-email=${HOOD_SITE_SUPPORT_EMAIL:compliance@kitchenpermit.com}
hood.storage.root=${HOOD_STORAGE_ROOT:./storage}
hood.axis1.asset-storage.driver=${HOOD_AXIS1_ASSET_STORAGE_DRIVER:filesystem}
hood.axis1.r2.bucket=${HOOD_AXIS1_R2_BUCKET:${CLOUDFLARE_R2_BUCKET:}}
hood.axis1.r2.endpoint=${HOOD_AXIS1_R2_ENDPOINT:${CLOUDFLARE_R2_ENDPOINT:}}
hood.axis1.r2.access-key-id=${HOOD_AXIS1_R2_ACCESS_KEY_ID:${CLOUDFLARE_R2_ACCESS_KEY_ID:}}
hood.axis1.r2.secret-access-key=${HOOD_AXIS1_R2_SECRET_ACCESS_KEY:${CLOUDFLARE_R2_SECRET_ACCESS_KEY:}}
hood.axis1.r2.region=${HOOD_AXIS1_R2_REGION:${CLOUDFLARE_R2_REGION:auto}}
hood.axis1.r2.key-prefix=${HOOD_AXIS1_R2_KEY_PREFIX:${CLOUDFLARE_R2_KEY_PREFIX:axis1-reports}}
hood.database.keepalive.enabled=${HOOD_DATABASE_KEEPALIVE_ENABLED:true}
hood.database.keepalive.initial-delay-ms=${HOOD_DATABASE_KEEPALIVE_INITIAL_DELAY_MS:60000}
hood.database.keepalive.delay-ms=${HOOD_DATABASE_KEEPALIVE_DELAY_MS:43200000}
hood.billing.provider=${HOOD_BILLING_PROVIDER:abstract}
hood.billing.environment=${HOOD_BILLING_ENVIRONMENT:sandbox}
hood.billing.paddle.company-price-id=${PADDLE_COMPANY_PRICE_ID:}
hood.billing.paddle.api-key=${PADDLE_API_KEY:}
hood.billing.paddle.client-token=${PADDLE_CLIENT_TOKEN:}
hood.billing.paddle.api-base-url=${PADDLE_API_BASE_URL:}
hood.billing.paddle.webhook-secret=${PADDLE_WEBHOOK_SECRET:}
hood.billing.paddle.webhook-tolerance-seconds=${PADDLE_WEBHOOK_TOLERANCE_SECONDS:300}
